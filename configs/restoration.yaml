restoration:
  steps: 40
  guidance_scale: 7.5
  strength: 0.85
  visible_prompt: a night street scene, asphalt road, pedestrians, highly detailed, realistic
  visible_negative_prompt: colorful blocks, yellow patches, glowing artifacts, deformed, noisy, bright daytime
  infrared_prompt: smooth thermal infrared imaging, grayscale, pedestrians, street, sharp edges, high contrast, highly detailed
  infrared_negative_prompt: colorful, glowing, bloated, blurry, melting, deformed, noisy, patches, bright daylight
  train:
    resolution: 512
    batch_size: 1
    epochs: 30
    lr: 0.00001
    weight_decay: 0.0001
    num_workers: 0
    lambda_l1_global: 1.0
    lambda_l1_local: 10.0
    lambda_frequency: 0.01
    lambda_gan: 0.1
    lambda_tv: 0.005
    lambda_ir_heat: 20.0
    gan_start_epoch: 10
    grad_clip: 1.0
